<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beauty Studio — Panel Fryzjerki</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  .status-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:22px;
}

.status-btn{
  height:46px;
  border:1px solid #f0ded9;
  border-radius:15px;
  background:#fff7f5;
  color:#9b6b66;
  font-weight:700;
  cursor:pointer;
}

.status-btn.active{
  background:linear-gradient(90deg,#df8888,#e69595);
  color:white;
  border-color:transparent;
}
:root{
  --bg:#fff8f6;
  --white:#fff;
  --text:#25262a;
  --muted:#7e7e82;
  --line:#eee7e5;
  --accent:#e58d8d;
  --accent-dark:#d97979;
  --soft:#fff1ef;
  --shadow:0 22px 55px rgba(105,72,64,.12);
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#fff8f5,#f8ece8);
  font-family:Inter,sans-serif;
  color:var(--text);
}

.app{
  max-width:1280px;
  margin:auto;
  padding:32px 24px;
}

.topbar{
  background:#fff;
  border-radius:34px;
  box-shadow:var(--shadow);
  padding:28px 32px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:24px;
  margin-bottom:28px;
}

.logo{
  font-family:"Playfair Display",serif;
  font-size:42px;
}

.sublogo{
  color:#9c8580;
  font-size:11px;
  letter-spacing:6px;
  margin-top:2px;
}

.profile{
  display:flex;
  align-items:center;
  gap:14px;
}

.avatar{
  width:56px;
  height:56px;
  border-radius:50%;
  background:linear-gradient(135deg,#f2aaa6,#e57f82);
  color:#fff;
  display:grid;
  place-items:center;
  font-size:24px;
}

.profile strong{
  display:block;
}

.profile span{
  color:var(--muted);
  font-size:14px;
}

.layout{
  display:grid;
  grid-template-columns:1fr 380px;
  gap:28px;
}

.hero{
  min-height:230px;
  border-radius:36px;
  box-shadow:var(--shadow);
  overflow:hidden;
  position:relative;
  padding:38px;
  background:
    linear-gradient(90deg,rgba(255,245,242,.94) 0%,rgba(255,245,242,.68) 42%,rgba(255,255,255,0) 100%),
    url("https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=1200&q=80");
  background-size:cover;
  background-position:center;
  margin-bottom:28px;
}

.hero h1{
  font-family:"Playfair Display",serif;
  font-size:50px;
  line-height:1.1;
  font-weight:400;
  margin:0 0 16px;
}

.hero p{
  color:#7b6d69;
  max-width:460px;
  line-height:1.7;
  margin:0;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-bottom:28px;
}

.stat{
  background:#fff;
  border-radius:28px;
  box-shadow:var(--shadow);
  padding:24px;
}

.stat span{
  color:var(--muted);
  font-size:14px;
}

.stat strong{
  display:block;
  font-size:34px;
  margin-top:8px;
  color:var(--accent-dark);
}

.section{
  background:#fff;
  border-radius:34px;
  box-shadow:var(--shadow);
  padding:30px;
}

.section-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  margin-bottom:24px;
}

.section h2{
  font-family:"Playfair Display",serif;
  font-size:34px;
  font-weight:400;
  margin:0;
}

.date-pill{
  background:#fff1ef;
  color:#b96d69;
  border-radius:999px;
  padding:12px 18px;
  font-weight:600;
  font-size:14px;
}

.booking-list{
  display:grid;
  gap:16px;
}

.booking{
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px;
  display:grid;
  grid-template-columns:90px 1fr auto;
  gap:18px;
  align-items:center;
  cursor:pointer;
  transition:.2s;
}

.booking:hover,
.booking.active{
  border-color:#ef8b8d;
  box-shadow:0 0 0 1px #ef8b8d inset, 0 14px 30px rgba(105,72,64,.08);
}

.time{
  width:72px;
  height:72px;
  border-radius:22px;
  background:linear-gradient(135deg,#fff2ef,#f8e4df);
  display:grid;
  place-items:center;
  color:#c96f6f;
  font-weight:700;
  font-size:18px;
}

.booking h3{
  margin:0 0 7px;
  font-size:18px;
}

.booking p{
  margin:0;
  color:var(--muted);
  font-size:14px;
}

.price{
  color:#d97979;
  font-weight:700;
  font-size:18px;
}

.status{
  margin-top:10px;
  display:inline-flex;
  border-radius:999px;
  padding:7px 12px;
  background:#fff4f1;
  color:#c56e6e;
  font-size:13px;
  font-weight:600;
}

.sidebar{
  position:sticky;
  top:24px;
  align-self:start;
}

.details{
  background:#fff;
  border-radius:34px;
  box-shadow:var(--shadow);
  padding:30px;
}

.details h2{
  font-family:"Playfair Display",serif;
  font-size:32px;
  font-weight:400;
  margin:0 0 22px;
}

.detail-row{
  padding:16px 0;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  gap:18px;
}

.detail-row span{
  color:var(--muted);
}

.detail-row strong{
  text-align:right;
}

.note{
  margin-top:22px;
  background:linear-gradient(180deg,#fffaf8,#fff2ef);
  border:1px solid #f0ded9;
  border-radius:24px;
  padding:20px;
}

.note span{
  display:block;
  color:#8b7a76;
  font-size:14px;
  margin-bottom:8px;
}

.note p{
  margin:0;
  line-height:1.6;
}

.actions{
  display:grid;
  gap:12px;
  margin-top:24px;
}

.btn{
  width:100%;
  height:58px;
  border:0;
  border-radius:18px;
  font:inherit;
  cursor:pointer;
  font-weight:700;
}

.btn.primary{
  background:linear-gradient(90deg,#df8888,#e69595);
  color:#fff;
  letter-spacing:2px;
}

.btn.light{
  background:#fff1ef;
  color:#a86a66;
}

.empty{
  color:var(--muted);
  line-height:1.6;
}

@media(max-width:850px){
  .app{
    padding:0;
  }

  .topbar{
    border-radius:0;
    box-shadow:none;
    padding:26px 24px;
  }

  .logo{
    font-size:34px;
  }

  .sublogo{
    font-size:9px;
    letter-spacing:5px;
  }

  .profile{
    display:none;
  }

  .layout{
    display:block;
  }

  .hero{
    border-radius:0;
    min-height:310px;
    margin:0;
    padding:42px 24px;
    background:
      linear-gradient(90deg,rgba(255,245,242,.88),rgba(255,245,242,.25),rgba(255,255,255,0)),
      url("https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=900&q=80");
    background-size:cover;
    background-position:center right;
  }

  .hero h1{
    display:inline-block;
    background:rgba(255,248,246,.88);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-radius:24px;
    padding:18px 20px;
    font-size:37px;
    box-shadow:0 16px 35px rgba(80,45,38,.15);
  }

  .hero p{
    display:none;
  }

  .stats{
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    padding:18px;
    margin:0;
  }

  .stat{
    border-radius:22px;
    padding:16px 12px;
  }

  .stat strong{
    font-size:25px;
  }

  .section{
    border-radius:28px 28px 0 0;
    padding:24px 18px;
  }

  .section-head{
    display:block;
  }

  .section h2{
    font-size:32px;
    margin-bottom:12px;
  }

  .booking{
    grid-template-columns:68px 1fr;
    padding:14px;
  }

  .time{
    width:58px;
    height:58px;
    border-radius:18px;
    font-size:15px;
  }

  .price{
    grid-column:2;
  }

  .sidebar{
    position:static;
    padding:18px;
  }

  .details{
    border-radius:28px;
    padding:24px;
  }
}
.empty-big{
  min-height:260px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:34px 20px;
  border:1px dashed #eadbd7;
  border-radius:26px;
  background:linear-gradient(180deg,#fffaf8,#fff2ef);
  color:#8b7a76;
}

.empty-big-icon{
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(135deg,#f2aaa6,#e57f82);
  color:white;
  display:grid;
  place-items:center;
  font-size:34px;
  margin-bottom:18px;
}

.empty-big h3{
  margin:0 0 8px;
  font-family:"Playfair Display",serif;
  font-size:28px;
  font-weight:400;
  color:#25262a;
}

.empty-big p{
  margin:0;
  max-width:360px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="app">

  <header class="topbar">
    <div>
      <div class="logo">Beauty Studio</div>
      <div class="sublogo">PANEL PRACOWNIKA</div>
    </div>

    <div class="profile">
      <div class="avatar">J</div>
      <div>
        <strong>Julia</strong>
        <span>Fryzjerka / stylistka</span>
      </div>
    </div>
  </header>

  <div class="layout">
    <main>
      <section class="hero">
        <h1>Dzień dobry,<br>Julia</h1>
        <p>Sprawdź dzisiejsze rezerwacje, godziny wizyt, dane klientek oraz szczegóły usług.</p>
      </section>

      <section class="stats">
  <div class="stat">
    <span>Rezerwacje</span>
    <strong id="statCount">0</strong>
  </div>
  <div class="stat">
    <span>Wartość</span>
    <strong id="statMoney">0 zł</strong>
  </div>
  <div class="stat">
    <span>Najbliższa</span>
    <strong id="statNext">—</strong>
  </div>
</section>

      <section class="section">
        <div class="section-head">
          <h2>Dzisiejsze rezerwacje</h2>
          <div class="date-pill">15 maja 2026</div>
        </div>

        <div class="booking-list" id="bookingList"></div>
      </section>
    </main>

    <aside class="sidebar">
      <div class="details" id="details"></div>
    </aside>
  </div>
</div>

<script>
let bookings = [];

let active = 0;

function renderList(){
  const list = document.getElementById("bookingList");

  if (bookings.length === 0) {
    list.innerHTML = `
      <div class="empty-big">
        <div class="empty-big-icon">📅</div>
        <h3>Brak rezerwacji</h3>
        <p>Gdy klient zarezerwuje wizytę przez formularz, pojawi się ona tutaj automatycznie.</p>
      </div>
    `;
    updateStats();
    return;
  }

  list.innerHTML = bookings.map((b,i)=>`
    <div class="booking ${active===i?'active':''}" onclick="selectBooking(${i})">
      <div class="time">${b.time}</div>

      <div>
        <h3>${b.client}</h3>
        <p>${b.service} • ${b.duration}</p>
        <span class="status">${b.status}</span>
      </div>

      <div class="price">${b.price}</div>
    </div>
  `).join("");

  updateStats();
}
function updateStats(){
  const count = bookings.length;

  const total = bookings.reduce((sum, b) => {
    const number = parseFloat(String(b.price).replace(",", ".").replace(/[^\d.]/g, ""));
    return sum + (isNaN(number) ? 0 : number);
  }, 0);

  const next = bookings
    .map(b => b.time)
    .filter(t => t && t !== "-")
    .sort()[0] || "—";

  document.getElementById("statCount").textContent = count;
  document.getElementById("statMoney").textContent = `${total} zł`;
  document.getElementById("statNext").textContent = next;
}

function renderDetails(){
  if (bookings.length === 0) {
  document.getElementById("details").innerHTML = `
    <h2>Szczegóły wizyty</h2>
    <p class="empty">Brak rezerwacji do wyświetlenia.</p>
  `;
  return;
}
  const b = bookings[active];

  document.getElementById("details").innerHTML = `
    <h2>Szczegóły wizyty</h2>

    <div class="detail-row"><span>Godzina</span><strong>${b.time}</strong></div>
    <div class="detail-row"><span>Klientka</span><strong>${b.client}</strong></div>
    <div class="detail-row"><span>Telefon</span><strong>${b.phone}</strong></div>
    <div class="detail-row"><span>Usługa</span><strong>${b.service}</strong></div>
    <div class="detail-row"><span>Czas</span><strong>${b.duration}</strong></div>
    <div class="detail-row"><span>Cena</span><strong>${b.price}</strong></div>
    <div class="detail-row"><span>Status</span><strong>${b.status}</strong></div>

    <div class="note">
      <span>Uwagi klientki</span>
      <p>${b.note}</p>
    </div>

    <div class="status-buttons">
      <button class="status-btn ${b.status==='Nowa'?'active':''}" onclick="changeStatus('Nowa')">Nowa</button>
      <button class="status-btn ${b.status==='Potwierdzona'?'active':''}" onclick="changeStatus('Potwierdzona')">Potwierdzona</button>
      <button class="status-btn ${b.status==='Oczekuje'?'active':''}" onclick="changeStatus('Oczekuje')">Oczekuje</button>
      <button class="status-btn ${b.status==='Zakończona'?'active':''}" onclick="changeStatus('Zakończona')">Zakończona</button>
    </div>

    <div class="actions">
      <button class="btn primary" onclick="changeStatus('Zakończona')">ZAKOŃCZ WIZYTĘ</button>
      <button class="btn light" onclick="alert('Tutaj można dodać zmianę terminu')">ZMIEŃ TERMIN</button>
    </div>
  `;
}

function selectBooking(i){
  active = i;
  renderList();
  renderDetails();
}

async function changeStatus(newStatus){
  const booking = bookings[active];
  if (!booking) return;

  const { error } = await supabaseClient
    .from("reservations")
    .update({ status: newStatus })
    .eq("id", booking.id);

  if (error) {
    console.log(error);
    alert("Nie udało się zmienić statusu.");
    return;
  }

  bookings[active].status = newStatus;
  renderList();
  renderDetails();
}
async function loadBookings(){
  const { data, error } = await supabaseClient
    .from("reservations")
    .select("*")
    .order("created_at", { ascending: false });

  if(error){
    console.log(error);
    alert("Błąd pobierania rezerwacji");
    return;
  }

  bookings = data.map(r => {
    const msg = r.message || "";

    const timeMatch = msg.match(/Godzina:\s*([^|]+)/);
    const priceMatch = msg.match(/Cena:\s*([^|]+)/);
    const noteMatch = msg.match(/Opis:\s*([^|]+)/);

    return {
      id: r.id,
      time: timeMatch ? timeMatch[1].trim() : "-",
      client: r.name || "-",
      service: r.service || "-",
      duration: "60 min",
      price: priceMatch ? priceMatch[1].trim() : "-",
      phone: r.phone || "-",
      status: r.status || "Nowa",
      note: noteMatch ? noteMatch[1].trim() : "Brak uwag."
    };
  });

  active = 0;
  renderList();
  renderDetails();
}
loadBookings();
</script>

</body>
</html>
