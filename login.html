
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PITSTOP Auto Service — Logowanie</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f7fb;
      --card: rgba(255, 255, 255, 0.82);
      --text: #111827;
      --muted: #6b7280;
      --border: rgba(148, 163, 184, 0.28);
      --blue: #2563eb;
      --purple: #7c3aed;
      --shadow: 0 28px 80px rgba(15, 23, 42, 0.14);
      --soft-shadow: 0 16px 45px rgba(37, 99, 235, 0.16);
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(59, 130, 246, 0.16), transparent 32%),
        radial-gradient(circle at 82% 18%, rgba(124, 58, 237, 0.13), transparent 34%),
        radial-gradient(circle at 50% 95%, rgba(37, 99, 235, 0.09), transparent 35%),
        linear-gradient(135deg, #f8fafc 0%, #eef3fb 48%, #f7f8fc 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
      overflow-x: hidden;
    }

    .background-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.55;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black, transparent 75%);
    }

    .decor {
      position: fixed;
      width: 120px;
      height: 120px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(16px);
      display: grid;
      place-items: center;
      color: rgba(37, 99, 235, 0.55);
    }

    .decor svg {
      width: 46px;
      height: 46px;
      stroke-width: 1.8;
    }

    .decor.one {
      top: 13%;
      left: 14%;
      transform: rotate(-9deg);
    }

    .decor.two {
      right: 13%;
      bottom: 16%;
      transform: rotate(8deg);
    }

    .decor.three {
      right: 18%;
      top: 14%;
      width: 84px;
      height: 84px;
      border-radius: 24px;
      color: rgba(124, 58, 237, 0.45);
    }

    .login-shell {
      position: relative;
      width: 100%;
      max-width: 474px;
      z-index: 2;
    }

    .login-card {
      width: 100%;
      padding: 34px;
      border-radius: 32px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.75), transparent 42%),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.12), transparent 34%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 30px;
    }

    .logo-icon {
      width: 50px;
      height: 50px;
      border-radius: 17px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 16px 32px rgba(37, 99, 235, 0.28);
      color: white;
    }

    .logo-icon svg {
      width: 27px;
      height: 27px;
    }

    .logo-text strong {
      display: block;
      font-size: 17px;
      letter-spacing: -0.03em;
    }

    .logo-text span {
      font-size: 13px;
      color: var(--muted);
    }

    h1 {
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: -0.055em;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 28px;
    }

    .form {
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: #374151;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: #94a3b8;
      pointer-events: none;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      height: 54px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      padding: 0 52px;
      outline: none;
      font-size: 15px;
      color: #111827;
      transition: 0.22s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    input::placeholder {
      color: #a1aab8;
    }

    input:focus {
      border-color: rgba(37, 99, 235, 0.55);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.11);
    }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: 0.2s ease;
    }

    .eye-btn:hover {
      background: rgba(37, 99, 235, 0.08);
      color: #2563eb;
    }

    .eye-btn svg {
      position: static;
      transform: none;
      pointer-events: auto;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 2px;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      color: #4b5563;
      cursor: pointer;
      user-select: none;
    }

    .remember input {
      width: 17px;
      height: 17px;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .forgot {
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      color: #2563eb;
      transition: 0.2s ease;
    }

    .forgot:hover {
      color: #7c3aed;
    }

    .login-btn {
      height: 56px;
      border: none;
      border-radius: 19px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--soft-shadow);
      transition: 0.24s ease;
      margin-top: 4px;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 22px 50px rgba(37, 99, 235, 0.26);
    }

    .login-btn:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      box-shadow: none;
    }

    .security {
      margin-top: 24px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px;
      border-radius: 22px;
      background: rgba(239, 246, 255, 0.78);
      border: 1px solid rgba(147, 197, 253, 0.38);
    }

    .security-icon {
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: white;
      color: #2563eb;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.11);
    }

    .security strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .security p {
      font-size: 12.8px;
      line-height: 1.5;
      color: #64748b;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, 0.28);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      width: min(360px, 100%);
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.22);
      text-align: center;
      animation: pop 0.24s ease;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.96) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .success-icon {
      width: 58px;
      height: 58px;
      border-radius: 20px;
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 18px 38px rgba(37, 99, 235, 0.26);
    }

    .modal-box h2 {
      font-size: 22px;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .modal-box p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .modal-box button {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 16px;
      color: white;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
    }

    @media (max-width: 720px) {
      body {
        padding: 22px 14px;
        align-items: flex-start;
      }

      .decor {
        display: none;
      }

      .login-card {
        padding: 26px 20px;
        border-radius: 28px;
        margin-top: 18px;
      }

      h1 {
        font-size: 29px;
      }

      .subtitle {
        font-size: 14px;
      }

      .row {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }

      input[type="text"],
      input[type="password"] {
        height: 52px;
        border-radius: 16px;
      }

      .login-btn {
        height: 54px;
      }
    }
  </style>
</head>

<body>
  <div class="background-grid"></div>

  <div class="decor one">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path d="M3 13h18l-2-5a3 3 0 0 0-3-2H8a3 3 0 0 0-3 2l-2 5Z"/>
      <path d="M5 13v4M19 13v4M7 17h.01M17 17h.01"/>
    </svg>
  </div>

  <div class="decor two">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path d="M14.7 6.3a4 4 0 0 0-5.4 5.4l-5.6 5.6a2 2 0 1 0 3 3l5.6-5.6a4 4 0 0 0 5.4-5.4l-2.5 2.5-3-3 2.5-2.5Z"/>
    </svg>
  </div>

  <div class="decor three">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
    </svg>
  </div>

  <main class="login-shell">
    <section class="login-card">
      <div class="content">
        <div class="logo">
          <div class="logo-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path d="M3 13h18l-2.1-5.2A3 3 0 0 0 16.1 6H7.9a3 3 0 0 0-2.8 1.8L3 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5 13v4m14-4v4M7 17h.01M17 17h.01" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="logo-text">
            <strong>PITSTOP Auto Service</strong>
            <span>Panel rezerwacji serwisu</span>
          </div>
        </div>

        <h1>Witaj ponownie</h1>
        <p class="subtitle">Zaloguj się, aby zarządzać rezerwacjami</p>

        <form class="form" id="loginForm">
          <div class="field">
            <label for="email">Email lub login</label>
            <div class="input-wrap">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path d="M4 6h16v12H4z" stroke-width="2" stroke-linejoin="round"/>
                <path d="m4 7 8 6 8-6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <input id="email" type="text" placeholder="Wpisz email lub login" autocomplete="username" />
            </div>
          </div>

          <div class="field">
            <label for="password">Hasło</label>
            <div class="input-wrap">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke-width="2" stroke-linecap="round"/>
                <path d="M6 11h12v9H6z" stroke-width="2" stroke-linejoin="round"/>
              </svg>
              <input id="password" type="password" placeholder="Wpisz hasło" autocomplete="current-password" />
              <button class="eye-btn" type="button" id="togglePassword" aria-label="Pokaż hasło">
                <svg id="eyeIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z" stroke-width="2"/>
                  <circle cx="12" cy="12" r="3" stroke-width="2"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="row">
            <label class="remember">
              <input type="checkbox" id="remember" />
              Zapamiętaj mnie
            </label>

            <a href="#" class="forgot">Zapomniałeś hasła?</a>
          </div>

          <button class="login-btn" id="loginBtn" type="submit" disabled>
            Zaloguj się
          </button>
        </form>

        <div class="security">
          <div class="security-icon">
            <svg width="21" height="21" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" stroke-width="2" stroke-linejoin="round"/>
              <path d="m9 12 2 2 4-4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <strong>Bezpieczne logowanie</strong>
            <p>Twoje dane są chronione zgodnie ze standardami bezpieczeństwa.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="modal" id="modal">
    <div class="modal-box">
      <div class="success-icon">
        <svg width="30" height="30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path d="m5 13 4 4L19 7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Zalogowano pomyślnie</h2>
      <p>Możesz przejść do zarządzania rezerwacjami.</p>
      <button id="closeModal">OK</button>
    </div>
  </div>

  <script>
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const togglePassword = document.getElementById("togglePassword");
    const eyeIcon = document.getElementById("eyeIcon");
    const form = document.getElementById("loginForm");
    const modal = document.getElementById("modal");
    const closeModal = document.getElementById("closeModal");

    function updateButtonState() {
      loginBtn.disabled = email.value.trim() === "" || password.value.trim() === "";
    }

    email.addEventListener("input", updateButtonState);
    password.addEventListener("input", updateButtonState);

    togglePassword.addEventListener("click", () => {
      const visible = password.type === "text";
      password.type = visible ? "password" : "text";

      eyeIcon.innerHTML = visible
        ? `
          <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" stroke-width="2"/>
        `
        : `
          <path d="M3 3l18 18" stroke-width="2" stroke-linecap="round"/>
          <path d="M10.6 10.6A3 3 0 0 0 13.4 13.4" stroke-width="2" stroke-linecap="round"/>
          <path d="M9.9 5.3A10.4 10.4 0 0 1 12 5c6.5 0 10 7 10 7a17.4 17.4 0 0 1-3.1 4.1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6.1 6.8C3.5 8.6 2 12 2 12s3.5 7 10 7a9.7 9.7 0 0 0 4.1-.9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        `;
    });

   form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (loginBtn.disabled) return;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email.value.trim(),
    password: password.value.trim()
  });

  if (error) {
    alert("Błędny email lub hasło.");
    console.log(error);
    return;
  }

  window.location.href = "panel.html";
});

    closeModal.addEventListener("click", () => {
      modal.classList.remove("active");
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        modal.classList.remove("active");
      }
    });
  </script>
</body>
</html>
