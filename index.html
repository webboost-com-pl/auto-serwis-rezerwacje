<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beauty Studio — Rezerwacja</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
:root{
  --bg:#fff8f6;
  --white:#fff;
  --text:#25262a;
  --muted:#7e7e82;
  --line:#eee7e5;
  --accent:#e58d8d;
  --accent2:#f4b4aa;
  --soft:#fff1ef;
  --shadow:0 22px 55px rgba(105,72,64,.12);
  --radius:30px;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#fff8f5,#f8ece8);
  font-family:Inter,sans-serif;
  color:var(--text);
}

.app{
  max-width:1280px;
  margin:auto;
  padding:38px 28px;
}

.mobile-shell{
  display:none;
}

.desktop{
  display:block;
}

.desktop-hero{
  display:grid;
  grid-template-columns:1fr 430px;
  gap:34px;
  align-items:stretch;
  margin-bottom:34px;
}

.hero-left{
  background:linear-gradient(90deg,#fff5f2 0%,#fff8f6 48%,#f2d4cb 100%);
  border-radius:36px;
  overflow:hidden;
  min-height:360px;
  position:relative;
  box-shadow:var(--shadow);
  padding:44px;
}

.hero-left .logo,
.hero-left .sublogo{
  position:relative;
  z-index:3;
  text-align:left;
  max-width:460px;
}
.logo{
  text-align:center;
  font-family:"Playfair Display",serif;
  font-size:44px;
  letter-spacing:.3px;
}

.sublogo{
  text-align:center;
  color:#9c8580;
  font-size:12px;
  letter-spacing:7px;
  margin-top:3px;
}

.hero-title{
  position:relative;
  z-index:3;
  font-family:"Playfair Display",serif;
  font-size:56px;
  line-height:1.12;
  margin-top:64px;
  max-width:430px;
}

.hero-img{
  position:absolute;
  right:0;
  top:0;
  width:54%;
  height:100%;
  background:
    linear-gradient(90deg,rgba(255,245,242,.92) 0%,rgba(255,245,242,.38) 32%,rgba(255,255,255,0) 72%),
    url("https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=1200&q=80");
  background-size:cover;
  background-position:center;
}

.summary{
  background:#fff;
  border-radius:34px;
  box-shadow:var(--shadow);
  padding:32px;
  position:sticky;
  top:28px;
}

.summary h3{
  font-family:"Playfair Display",serif;
  font-size:31px;
  margin:0 0 22px;
}

.sum-row{
  padding:17px 0;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  gap:20px;
  font-size:15px;
}

.sum-row span:first-child{color:var(--muted)}
.sum-row span:last-child{text-align:right;font-weight:600}

.panel{
  background:#fff;
  border-radius:38px;
  box-shadow:var(--shadow);
  padding:34px;
}

.steps{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:38px;
}

.step{
  text-align:center;
  min-width:120px;
  color:#777;
  font-size:17px;
}

.step-circle{
  width:72px;
  height:72px;
  margin:0 auto 12px;
  border-radius:50%;
  background:#f5f4f4;
  display:grid;
  place-items:center;
  color:#777;
  font-size:28px;
}

.step.active{
  color:var(--accent);
  font-weight:600;
}

.step.active .step-circle{
  background:linear-gradient(135deg,#f3aaa6,#e47f82);
  color:white;
}

.step-line{
  width:70px;
  height:2px;
  background:#eee;
  margin-bottom:36px;
}

h1{
  font-family:"Playfair Display",serif;
  font-size:40px;
  font-weight:400;
  margin:0 0 28px;
}

.grid-services{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.card{
  border:1px solid var(--line);
  border-radius:22px;
  padding:20px;
  background:#fff;
  min-height:118px;
  display:flex;
  align-items:center;
  gap:18px;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 30px rgba(70,45,38,.08);
}

.card.active{
  border-color:#f08489;
  box-shadow:0 0 0 1px #f08489 inset;
}

.icon{
  width:64px;
  height:64px;
  border-radius:50%;
  background:linear-gradient(135deg,#fff2ef,#f8e4df);
  display:grid;
  place-items:center;
  color:#c96f6f;
  font-size:27px;
  flex:none;
}

.card-main{flex:1}
.card-title{font-size:18px;font-weight:500;margin-bottom:7px}
.card-sub{font-size:14px;color:var(--muted)}
.price{font-size:21px;color:#d97979;white-space:nowrap}
.check{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#ef777a;
  color:white;
  display:none;
  place-items:center;
  font-size:23px;
  font-weight:700;
}
.card.active .check{display:grid}

.specialists{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

.specialist{
  display:block;
  text-align:center;
  padding:28px 18px;
}

.avatar{
  width:82px;
  height:82px;
  border-radius:50%;
  margin:0 auto 16px;
  background:linear-gradient(135deg,#ffe8e4,#f5b9b2);
  display:grid;
  place-items:center;
  font-size:34px;
  color:#b86969;
}

.calendar-box{
  border:1px solid var(--line);
  border-radius:26px;
  padding:22px;
  background:linear-gradient(180deg,#fff,#fff9f7);
  margin-bottom:24px;
}

.calendar-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.calendar-head h2{
  margin:0;
  font-family:"Playfair Display",serif;
  font-size:28px;
  font-weight:400;
}

.month-btn{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#fff1ef;
  color:#c96f6f;
  font-size:22px;
}

.weekdays,
.days-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:9px;
}

.weekdays div{
  text-align:center;
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
}

.day-btn{
  height:48px;
  border-radius:15px;
  background:#fff;
  border:1px solid transparent;
  color:#333;
}

.day-btn:hover{
  background:#fff4f1;
}

.day-btn.active{
  background:linear-gradient(135deg,#f2aaa6,#e57f82);
  color:white;
  font-weight:700;
  box-shadow:0 10px 22px rgba(229,127,130,.25);
}

.day-btn.empty{
  opacity:0;
  pointer-events:none;
}

.time-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
  margin-bottom:26px;
}

.time-btn{
  border:1px solid var(--line);
  background:#fff;
  border-radius:18px;
  padding:18px 10px;
  cursor:pointer;
  font-size:15px;
  color:#333;
}

.time-btn.active{
  border-color:#ef777a;
  background:#fff3f1;
  color:#d96f73;
  font-weight:700;
}

.forms{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

input,textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  font:inherit;
  outline:none;
}

textarea{
  grid-column:1/-1;
  resize:none;
  min-height:110px;
}

.actions{
  display:flex;
  gap:14px;
  margin-top:28px;
}

button{
  border:0;
  cursor:pointer;
  font:inherit;
}

.btn{
  width:100%;
  height:64px;
  border-radius:18px;
  background:linear-gradient(90deg,#df8888,#e69595);
  color:white;
  font-weight:700;
  letter-spacing:4px;
  font-size:16px;
}

.btn.back{
  width:170px;
  background:#f7eeee;
  color:#a16b68;
  letter-spacing:1px;
}

.hidden{display:none}

.success{
  text-align:center;
  padding:50px 20px;
}

.success-icon{
  width:92px;
  height:92px;
  border-radius:50%;
  background:linear-gradient(135deg,#f2aaa6,#e57f82);
  color:white;
  display:grid;
  place-items:center;
  font-size:44px;
  margin:0 auto 22px;
}

/* MOBILE */
@media(max-width:760px){
  body{
    background:#fff;
  }

  .app{
    padding:0;
  }

  .desktop{
    display:none;
  }

  .mobile-shell{
    display:block;
    min-height:100vh;
    background:#fff;
    overflow:hidden;
  }

  .m-top{
    height:100px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    background:white;
  }

  .hamb{
    font-size:35px;
    line-height:1;
  }

  .phone{
    width:50px;
    height:50px;
    border-radius:50%;
    background:#f6c7bd;
    display:grid;
    place-items:center;
    color:#92615b;
    font-size:23px;
  }

  .m-brand{
    text-align:center;
  }

  .m-brand .logo{
    font-size:31px;
  }

  .m-brand .sublogo{
    font-size:8px;
    letter-spacing:5px;
  }

.m-hero{
  height:430px;
  background:
    linear-gradient(90deg,
      rgba(255,243,240,.18) 0%,
      rgba(255,243,240,.05) 45%,
      rgba(255,243,240,0) 100%
    ),
    url("https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=900&q=80");
  background-size:cover;
  background-position:center right;
  padding:64px 24px 0;
  position:relative;
}

.m-hero h2{
  display:inline-block;
  max-width:260px;
  padding:18px 20px;
  border-radius:24px;
  background:rgba(255,248,246,.88);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  box-shadow:0 16px 35px rgba(80,45,38,.16);
  font-family:"Playfair Display",serif;
  font-size:38px;
  line-height:1.18;
  font-weight:400;
  margin:0;
  color:#242428;
  text-shadow:none;
}

.heart{
  width:48px;
  height:48px;
  border-radius:50%;
  background:rgba(255,248,246,.9);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  box-shadow:0 12px 28px rgba(80,45,38,.14);
  color:#d4827c;
  font-size:32px;
  margin-top:18px;
  display:grid;
  place-items:center;
}

.m-panel{
  margin:-26px 18px 28px;
  background:#fff;
  border-radius:28px;
  box-shadow:0 20px 55px rgba(70,45,38,.13);
  padding:26px 20px 22px;
  position:relative;
  z-index:5;
}

  .steps{
    margin-bottom:34px;
  }

  .step{
    min-width:auto;
    flex:1;
    font-size:13px;
  }

  .step-circle{
    width:58px;
    height:58px;
    font-size:23px;
    margin-bottom:10px;
  }

  .step-line{
    width:26px;
    margin-bottom:33px;
  }

  h1{
    font-size:32px;
    margin-bottom:26px;
  }

  .grid-services,
  .specialists,
  .date-grid,
  .time-grid,
  .forms{
    display:block;
  }

  .card{
    min-height:74px;
    padding:14px;
    border-radius:17px;
    margin-bottom:12px;
    gap:14px;
  }

  .icon{
    width:54px;
    height:54px;
    font-size:24px;
  }

  .card-title{
    font-size:16px;
  }

  .card-sub{
    font-size:13px;
  }

  .price{
    font-size:18px;
  }

  .check{
    width:36px;
    height:36px;
  }

 .calendar-box{
  padding:16px;
  border-radius:22px;
}

.calendar-head h2{
  font-size:24px;
}

.weekdays,
.days-grid{
  gap:5px;
}

.day-btn{
  height:42px;
  border-radius:13px;
  font-size:13px;
}

.time-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.time-btn{
  padding:16px 8px;
}

  input,textarea{
    margin-bottom:12px;
  }

  .actions{
    margin-top:20px;
  }

  .btn{
    height:58px;
    border-radius:16px;
  }

  .btn.back{
    width:120px;
  }
}
.final-summary{
  max-width:420px;
  margin:26px auto 30px;
  background:linear-gradient(180deg,#fffaf8,#fff2ef);
  border:1px solid #f0ded9;
  border-radius:26px;
  padding:22px;
  box-shadow:0 18px 38px rgba(105,72,64,.10);
  text-align:left;
}

.final-summary-row{
  display:flex;
  justify-content:space-between;
  gap:18px;
  padding:13px 0;
  border-bottom:1px solid #efdfdb;
  font-size:15px;
}

.final-summary-row:last-child{
  border-bottom:0;
}

.final-summary-row span:first-child{
  color:#8b7a76;
}

.final-summary-row span:last-child{
  font-weight:700;
  color:#2b2b2f;
  text-align:right;
}
.booking-preview{
  grid-column:1/-1;
  background:linear-gradient(180deg,#fffaf8,#fff2ef);
  border:1px solid #f0ded9;
  border-radius:24px;
  padding:22px;
  box-shadow:0 14px 32px rgba(105,72,64,.09);
}

.booking-preview-title{
  font-family:"Playfair Display",serif;
  font-size:26px;
  margin-bottom:14px;
}

.booking-preview-row{
  display:flex;
  justify-content:space-between;
  gap:18px;
  padding:12px 0;
  border-bottom:1px solid #efdfdb;
}

.booking-preview-row:last-child{
  border-bottom:0;
}

.booking-preview-row span{
  color:#8b7a76;
}

.booking-preview-row strong{
  text-align:right;
  font-weight:700;
}
</style>
</head>

<body>

<div class="app">

  <div class="mobile-shell">
    <div class="m-top">
      <div class="hamb">☰</div>
      <div class="m-brand">
        <div class="logo">Beauty Studio</div>
        <div class="sublogo">SALON KOSMETYCZNY</div>
      </div>
      <div class="phone">☎</div>
    </div>

    <div class="m-hero">
      <h2>Piękno<br>zaczyna się<br>od Ciebie</h2>
      <div class="heart">♡</div>
    </div>

    <div class="m-panel">
      <div id="mobileSteps"></div>
      <div id="mobileContent"></div>
    </div>
  </div>

  <div class="desktop">
    <div class="desktop-hero">
      <div class="hero-left">
        <div class="logo">Beauty Studio</div>
        <div class="sublogo">SALON KOSMETYCZNY</div>
        <div class="hero-title">Piękno<br>zaczyna się<br>od Ciebie</div>
        <div class="hero-img"></div>
      </div>

      <aside class="summary">
        <h3>Podsumowanie</h3>
        <div class="sum-row"><span>Usługa</span><span id="sService">—</span></div>
        <div class="sum-row"><span>Kosmetolog</span><span id="sPerson">—</span></div>
        <div class="sum-row"><span>Data</span><span id="sDate">—</span></div>
        <div class="sum-row"><span>Godzina</span><span id="sTime">—</span></div>
        <div class="sum-row"><span>Cena</span><span id="sPrice">—</span></div>
      </aside>
    </div>

    <main class="panel">
      <div id="desktopSteps"></div>
      <div id="desktopContent"></div>
    </main>
  </div>
</div>

<script>
const services=[
  ["💅","Manicure hybrydowy","60 min","120 zł"],
  ["〰️","Przedłużanie rzęs 1:1","120 min","180 zł"],
  ["🖌️","Makijaż okolicznościowy","60 min","150 zł"],
  ["🧖","Zabieg na twarz","90 min","200 zł"],
  ["╱","Depilacja laserowa","30 min","100 zł"]
];

const people=[
  ["👩","Anna","manicure i stylizacja paznokci"],
  ["👱‍♀️","Julia","rzęsy i makijaż"],
  ["👩‍🦰","Marta","zabiegi na twarz i depilacja"]
];

const dates=["Pon 6.05","Wt 7.05","Śr 8.05","Czw 9.05","Pt 10.05"];
const times=["09:00","10:30","12:00","13:30","15:00","16:30","18:00"];

let step=1;
let data={
  service:null,
  person:null,
  date:null,
  time:null
};

function stepsHtml(){
  const labels=["Usługa","Kosmetolog","Termin","Dane"];
  const icons=["▣","♙","▣","✓"];
  return `
  <div class="steps">
    ${labels.map((l,i)=>`
      <div class="step ${step===i+1?'active':''}">
        <div class="step-circle">${icons[i]}</div>
        <div>${i+1}. ${l}</div>
      </div>
      ${i<3?'<div class="step-line"></div>':''}
    `).join("")}
  </div>`;
}

function card(icon,title,sub,price,active,onClick){
  return `
  <div class="card ${active?'active':''}" onclick="${onClick}">
    <div class="icon">${icon}</div>
    <div class="card-main">
      <div class="card-title">${title}</div>
      <div class="card-sub">${sub}</div>
    </div>
    ${price?`<div class="price">${price}</div>`:""}
    <div class="check">✓</div>
  </div>`;
}

function renderContent(){
  let html="";

  if(step===1){
    html=`
      <h1>Wybierz usługę</h1>
      <div class="grid-services">
        ${services.map((s,i)=>card(s[0],s[1],s[2],s[3],data.service===i,`selectService(${i})`)).join("")}
      </div>
      <div class="actions">
        <button class="btn" onclick="next()">DALEJ</button>
      </div>`;
  }

  if(step===2){
    html=`
      <h1>Wybierz kosmetologa</h1>
      <div class="specialists">
        ${people.map((p,i)=>`
          <div class="card specialist ${data.person===i?'active':''}" onclick="selectPerson(${i})">
            <div class="avatar">${p[0]}</div>
            <div class="card-title">${p[1]}</div>
            <div class="card-sub">${p[2]}</div>
          </div>
        `).join("")}
      </div>
      <div class="actions">
        <button class="btn back" onclick="back()">Wróć</button>
        <button class="btn" onclick="next()">DALEJ</button>
      </div>`;
  }

 if(step===3){
  const year = 2026;
  const month = 4; // maj, bo JS liczy miesiące od 0
  const monthName = "Maj 2026";
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const offset = firstDay === 0 ? 6 : firstDay - 1;

  let calendarDays = "";

  for(let i = 0; i < offset; i++){
    calendarDays += `<button class="day-btn empty"></button>`;
  }

  for(let day = 1; day <= daysInMonth; day++){
    const fullDate = `${day}.05.2026`;
    calendarDays += `
      <button 
        class="day-btn ${data.date === fullDate ? 'active' : ''}" 
        onclick="selectDate('${fullDate}')">
        ${day}
      </button>`;
  }

  html=`
    <h1>Wybierz termin</h1>

    <div class="calendar-box">
      <div class="calendar-head">
        <button class="month-btn">‹</button>
        <h2>${monthName}</h2>
        <button class="month-btn">›</button>
      </div>

      <div class="weekdays">
        <div>Pn</div>
        <div>Wt</div>
        <div>Śr</div>
        <div>Cz</div>
        <div>Pt</div>
        <div>Sb</div>
        <div>Nd</div>
      </div>

      <div class="days-grid">
        ${calendarDays}
      </div>
    </div>

    <div class="time-grid">
      ${times.map(t=>`<button class="time-btn ${data.time===t?'active':''}" onclick="selectTime('${t}')">${t}</button>`).join("")}
    </div>

    <div class="actions">
      <button class="btn back" onclick="back()">Wróć</button>
      <button class="btn" onclick="next()">DALEJ</button>
    </div>`;
}

  if(step===4){
    html=`
      <h1>Twoje dane</h1>
      <div class="forms">
        <input id="name" placeholder="Imię i nazwisko">
        <input id="phone" placeholder="Telefon">
        <input id="email" placeholder="E-mail">
        <input placeholder="Uwagi opcjonalnie">
        <div class="booking-preview">
  <div class="booking-preview-title">Podsumowanie wizyty</div>

  <div class="booking-preview-row">
    <span>Usługa</span>
    <strong>${data.service!==null?services[data.service][1]:"—"}</strong>
  </div>

  <div class="booking-preview-row">
    <span>Kosmetolog</span>
    <strong>${data.person!==null?people[data.person][1]:"—"}</strong>
  </div>

  <div class="booking-preview-row">
    <span>Termin</span>
    <strong>${data.date || "—"} ${data.time || ""}</strong>
  </div>

  <div class="booking-preview-row">
    <span>Cena</span>
    <strong>${data.service!==null?services[data.service][3]:"—"}</strong>
  </div>
</div>
      </div>
      <div class="actions">
        <button class="btn back" onclick="back()">Wróć</button>
        <button class="btn" onclick="finish()">ZAREZERWUJ</button>
      </div>`;
  }

  if(step===5){
  html=`
    <div class="success">
      <div class="success-icon">✓</div>
      <h1>Rezerwacja przyjęta</h1>

      <div class="final-summary">
        <div class="final-summary-row">
          <span>Usługa</span>
          <span>${data.service!==null?services[data.service][1]:"—"}</span>
        </div>

        <div class="final-summary-row">
          <span>Kosmetolog</span>
          <span>${data.person!==null?people[data.person][1]:"—"}</span>
        </div>

        <div class="final-summary-row">
          <span>Termin</span>
          <span>${data.date || "—"} ${data.time || ""}</span>
        </div>

        <div class="final-summary-row">
          <span>Cena</span>
          <span>${data.service!==null?services[data.service][3]:"—"}</span>
        </div>
      </div>

      <button class="btn" onclick="resetApp()">NOWA REZERWACJA</button>
    </div>`;
}

  document.getElementById("desktopSteps").innerHTML=step<5?stepsHtml():"";
  document.getElementById("mobileSteps").innerHTML=step<5?stepsHtml():"";
  document.getElementById("desktopContent").innerHTML=html;
  document.getElementById("mobileContent").innerHTML=html;
  updateSummary();
}

function selectService(i){data.service=i;renderContent()}
function selectPerson(i){data.person=i;renderContent()}
function selectDate(d){data.date=d;renderContent()}
function selectTime(t){data.time=t;renderContent()}

function next(){
  if(step===1 && data.service===null) return alert("Wybierz usługę.");
  if(step===2 && data.person===null) return alert("Wybierz kosmetologa.");
  if(step===3 && (!data.date || !data.time)) return alert("Wybierz datę i godzinę.");
  step++;
  renderContent();
}

function back(){
  if(step>1) step--;
  renderContent();
}

async function finish(){
  const name = document.getElementById("name")?.value.trim();
  const phone = document.getElementById("phone")?.value.trim();
  const email = document.getElementById("email")?.value.trim();

  if(!name || !phone || !email) {
    return alert("Uzupełnij wymagane dane.");
  }

  const reservation = {
    name: name,
    phone: phone,
    car: "-",
    service: services[data.service][1],
    date: data.date,
    message: `Email: ${email} | Kosmetolog: ${people[data.person][1]} | Godzina: ${data.time} | Cena: ${services[data.service][3]}`,
    status: "Nowa"
  };

  const { error } = await supabaseClient
    .from("reservations")
    .insert([reservation]);

  if (error) {
    alert("Błąd zapisu rezerwacji.");
    console.log(error);
    return;
  }

  step = 5;
  renderContent();
}

function resetApp(){
  step=1;
  data={service:null,person:null,date:null,time:null};
  renderContent();
}

function summaryText(){
  return `Usługa: ${data.service!==null?services[data.service][1]:"—"}
Kosmetolog: ${data.person!==null?people[data.person][1]:"—"}
Termin: ${data.date || "—"} ${data.time || ""}
Cena: ${data.service!==null?services[data.service][3]:"—"}`;
}

function updateSummary(){
  document.getElementById("sService").textContent=data.service!==null?services[data.service][1]:"—";
  document.getElementById("sPerson").textContent=data.person!==null?people[data.person][1]:"—";
  document.getElementById("sDate").textContent=data.date||"—";
  document.getElementById("sTime").textContent=data.time||"—";
  document.getElementById("sPrice").textContent=data.service!==null?services[data.service][3]:"—";
}

renderContent();
</script>

</body>
</html>
